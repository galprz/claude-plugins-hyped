<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      width: 260px;
      padding: 16px;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #111;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected    { background: #22c55e; }
    .dot.disconnected { background: #ef4444; }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .status-label {
      font-size: 14px;
      font-weight: 600;
      color: #111;
    }
    .status-label.disconnected { color: #ef4444; }
    .status-label.connected    { color: #16a34a; }
    .detail {
      font-size: 12px;
      color: #666;
      margin-left: 18px;
    }
    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 12px 0;
    }
    .hint {
      font-size: 11px;
      color: #999;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">Hyped</span>
  </div>

  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span class="status-label" id="label">Checking...</span>
  </div>
  <div class="detail" id="detail"></div>

  <hr class="divider">
  <div class="hint" id="hint"></div>

  <script src="popup.js"></script>
</body>
</html>
