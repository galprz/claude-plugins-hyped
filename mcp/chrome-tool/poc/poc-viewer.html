<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>POC Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; color: #fff; }
    canvas { max-width: 100%; max-height: 90vh; display: block; }
    #status { position: fixed; top: 8px; left: 8px; font-size: 12px; color: #0f0; background: rgba(0,0,0,0.7); padding: 4px 8px; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="status">connecting...</div>
  <canvas id="canvas" width="640" height="360"></canvas>
  <script>
    const canvas = document.getElementById('canvas')
    const ctx = canvas.getContext('2d')
    const status = document.getElementById('status')
    let frameCount = 0, lastFpsTime = Date.now(), fps = 0

    const ws = new WebSocket(`ws://${location.host}`)
    ws.onopen = () => { status.textContent = 'connected — waiting for frames...'; status.style.color = '#0f0' }
    ws.onclose = () => { status.textContent = 'disconnected'; status.style.color = '#f00' }
    ws.onerror = () => { status.textContent = 'error'; status.style.color = '#f00' }

    ws.onmessage = (evt) => {
      frameCount++
      const now = Date.now()
      if (now - lastFpsTime >= 1000) {
        fps = Math.round(frameCount / ((now - lastFpsTime) / 1000))
        frameCount = 0
        lastFpsTime = now
      }

      const img = new Image()
      img.onload = () => {
        canvas.width = img.naturalWidth
        canvas.height = img.naturalHeight
        ctx.drawImage(img, 0, 0)
        status.textContent = `${fps} fps — ${img.naturalWidth}×${img.naturalHeight}`
        URL.revokeObjectURL(img.src)
      }
      // Convert base64 to blob for efficient rendering
      const binary = atob(evt.data)
      const bytes = new Uint8Array(binary.length)
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i)
      img.src = URL.createObjectURL(new Blob([bytes], { type: 'image/jpeg' }))
    }
  </script>
</body>
</html>
